name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: nukenpm

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="${BIN_NAME}-${version}-${{ matrix.target }}"
          archive="${stage}.tar.gz"
          mkdir "$stage"
          cp "cli/target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/"
          cp README.md LICENSE "$stage/"
          tar czf "$archive" "$stage"
          shasum -a 256 "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.archive }}.sha256
