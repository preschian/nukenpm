name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: nukenpm

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="${BIN_NAME}-${version}-${{ matrix.target }}"
          archive="${stage}.tar.gz"
          mkdir "$stage"
          cp "cli/target/${{ matrix.target }}/release/${BIN_NAME}" "$stage/"
          cp README.md LICENSE "$stage/"
          tar czf "$archive" "$stage"
          shasum -a 256 "$archive" > "${archive}.sha256"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "" || true
          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.archive }}.sha256" \
            --clobber

  bump-formula:
    name: Bump Homebrew formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Render formula from template
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME#v}"
          tmp="$(mktemp -d)"
          gh release download "$GITHUB_REF_NAME" -p '*.sha256' -D "$tmp"
          sha() { awk '{print $1}' "$tmp/${BIN_NAME}-${VERSION}-$1.tar.gz.sha256"; }
          export SHA_AARCH64_APPLE_DARWIN="$(sha aarch64-apple-darwin)"
          export SHA_X86_64_APPLE_DARWIN="$(sha x86_64-apple-darwin)"
          export SHA_X86_64_UNKNOWN_LINUX_GNU="$(sha x86_64-unknown-linux-gnu)"
          envsubst '${VERSION} ${SHA_AARCH64_APPLE_DARWIN} ${SHA_X86_64_APPLE_DARWIN} ${SHA_X86_64_UNKNOWN_LINUX_GNU}' \
            < .github/nukenpm-formula.rb.tmpl > nukenpm.rb
          echo "--- rendered formula ---"
          cat nukenpm.rb

      - name: Commit and push to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/preschian/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp nukenpm.rb tap/Formula/nukenpm.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/nukenpm.rb; then
            echo "Formula already up to date."
          else
            git add Formula/nukenpm.rb
            git commit -m "chore: bump nukenpm to ${version}"
            git push
          fi
